<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Universal Create Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d125f4",
                        "background-light": "#f8f5f8",
                        "background-dark": "#1f1022",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<!-- Main Container (Simulating a Mobile Screen) -->
<div class="relative mx-auto h-[844px] w-[390px] overflow-hidden border border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Background: Dimmed Feed Screen -->
<div class="absolute inset-0 z-0 opacity-40 grayscale-[0.5]">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4">
<h1 class="text-xl font-bold tracking-tight">Explore</h1>
<span class="material-symbols-outlined text-2xl">notifications</span>
</header>
<!-- Feed Content Mockup -->
<div class="px-4 space-y-6">
<div class="rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800 h-64 w-full">
<img class="w-full h-full object-cover" data-alt="Fashion influencer posing in urban setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX2Djk30ZbyfFInttx9nyRjGlsTbcUrWD1aBfNxqcKQGFlLkgtmTRq66eC0Ue2oR6wkCBLsyt5nl24Q48hqp7Pa03oZUo59MjDRhfyzmyHyoBdhMtuMEMECX7k8Z4Jvj_fgUYfy3A7VvyYXkQltcz1py4gZf0Rc1MOQIdpWrTNFiu2A5l_xKYHXwd1tlf9-rYxYbHz8J5-H2Cg6qGthR7DGDrcH0Mqf1rYvidHtusMrOjQqxbNp5uYFbUD5_-FIKWs59PCSijV_g"/>
</div>
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="space-y-1">
<div class="h-4 w-32 bg-slate-300 dark:bg-slate-700 rounded"></div>
<div class="h-3 w-20 bg-slate-300 dark:bg-slate-700 rounded"></div>
</div>
</div>
<div class="rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800 h-48 w-full">
<img class="w-full h-full object-cover" data-alt="Concert stage with vibrant lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDASWgvBfzbH4QYcOOCsaRxe63sZGVwAJjS8g7jwlLz__map88iPo4akyUVlVDA40bApXaC9gFs8lKSZQqVarEF7mbdpCR0lxXt5Or8L_YUIoH_O8nLv0e4ub2QlKvIVVxHnvMWbHihf2jAYnu-sHn_7nI9BC1nJnqrdolDNDZzQi7ewocC8Hm-mz-di2Pv8Qp0O4CQMEfkdnXHgL4kZ4XukL-OzixQP9YWlPgtbL-uvZ0DJhYr4LdgnyYaiBUEGAK8Ni9thxCunQ"/>
</div>
</div>
</div>
<!-- Dimming Overlay -->
<div class="absolute inset-0 z-10 bg-slate-950/70 backdrop-blur-[2px]"></div>
<!-- Create Menu Bottom Sheet -->
<div class="absolute inset-x-0 bottom-0 z-20 flex flex-col items-stretch">
<div class="bg-background-light dark:bg-[#2a162d] rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-primary/20">
<!-- Handle -->
<div class="flex h-8 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-400 dark:bg-slate-600/50"></div>
</div>
<div class="px-6 pb-10 pt-2">
<h3 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight text-center mb-8">Create New</h3>
<div class="space-y-4">
<!-- Option 1: Post -->
<button class="flex w-full items-center gap-4 bg-slate-100 dark:bg-primary/5 hover:bg-primary/10 transition-colors p-4 rounded-2xl group border border-transparent hover:border-primary/30">
<div class="flex items-center justify-center rounded-xl bg-primary/20 text-primary shrink-0 size-14 transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
</div>
<div class="flex flex-col text-left">
<p class="text-slate-900 dark:text-white text-lg font-semibold">Post</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Share social content with your followers</p>
</div>
<span class="material-symbols-outlined ml-auto text-slate-400">chevron_right</span>
</button>
<!-- Option 2: Gig -->
<button class="flex w-full items-center gap-4 bg-slate-100 dark:bg-primary/5 hover:bg-primary/10 transition-colors p-4 rounded-2xl group border border-transparent hover:border-primary/30">
<div class="flex items-center justify-center rounded-xl bg-primary/20 text-primary shrink-0 size-14 transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-3xl">work</span>
</div>
<div class="flex flex-col text-left">
<p class="text-slate-900 dark:text-white text-lg font-semibold">Gig</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">List your influencer services for brands</p>
</div>
<span class="material-symbols-outlined ml-auto text-slate-400">chevron_right</span>
</button>
<!-- Option 3: Sponsorship -->
<button class="flex w-full items-center gap-4 bg-slate-100 dark:bg-primary/5 hover:bg-primary/10 transition-colors p-4 rounded-2xl group border border-transparent hover:border-primary/30">
<div class="flex items-center justify-center rounded-xl bg-primary/20 text-primary shrink-0 size-14 transition-transform group-hover:scale-110">
<span class="material-symbols-outlined text-3xl">campaign</span>
</div>
<div class="flex flex-col text-left">
<p class="text-slate-900 dark:text-white text-lg font-semibold">Sponsorship</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Create a campaign for influencers</p>
</div>
<span class="material-symbols-outlined ml-auto text-slate-400">chevron_right</span>
</button>
</div>
</div>
<!-- Bottom Navigation Bar (Customized for menu state) -->
<div class="flex items-center justify-around border-t border-slate-200 dark:border-primary/10 bg-slate-50 dark:bg-[#1f1022] px-4 pb-8 pt-3">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Home</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">search</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Explore</p>
</a>
<div class="relative -top-8">
<div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary text-white shadow-[0_0_20px_rgba(209,37,244,0.5)] outline outline-8 outline-background-light dark:outline-[#2a162d]">
<span class="material-symbols-outlined text-4xl font-bold transition-transform rotate-45">add</span>
</div>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">chat_bubble</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Inbox</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<p class="text-[10px] font-medium uppercase tracking-widest">Profile</p>
</a>
</div>
</div>
</div>
<!-- iOS Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 h-1.5 w-36 rounded-full bg-slate-300 dark:bg-slate-700 z-30"></div>
</div>
</body></html>
